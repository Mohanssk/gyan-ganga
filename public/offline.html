<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <title>Offline | Gyan Ganga</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000000 100%);
      color: #e2e8f0;
      font-family: Poppins, sans-serif;
      padding: 24px;
    }

    .card {
      max-width: 560px;
      width: 100%;
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.55);
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.3;
      color: #67e8f9;
    }

    p {
      margin: 14px 0 0;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    a,
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .primary {
      background: #22d3ee;
      color: #082f49;
    }

    .secondary {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>This page is shown because the internet is unavailable. Previously visited pages can still open from cache.</p>
    <div class="actions">
      <button class="primary" onclick="window.location.reload()">Try Again</button>
      <a class="secondary" href="/">Go to Home</a>
    </div>
  </main>
</body>
</html>
